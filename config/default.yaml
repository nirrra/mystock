provider: baostock
intraday_provider: itick
adjustment: qfq

network:
  http_proxy: http://127.0.0.1:7897
  https_proxy: http://127.0.0.1:7897
  no_proxy: 127.0.0.1,localhost

storage:
  base_dir: data
  universe_file: universe/main_board.parquet
  signals_dir: signals
  reports_dir: reports
  daily_dir: daily

universe:
  exclude_st: true
  min_history_days: 60
  min_avg_amount_20d: 100000000

history_momentum_filter:
  lookback_days: 200
  window_days: 5
  min_return: 0.10

screening:
  output_limit: 50

watchlist_trend_filter:
  enabled: true
  buy_score_min: 0.0
  price_action_score_min: 0.0

pick_trend_watchlist:
  buy_score_min: 70.0
  price_action_score_min: 55.0

probability:
  horizon_days: 20
  min_future_return: 0.03
  max_future_drawdown: 0.08
  min_history_days: 200
  top_n_list: [10, 20, 50]

trend_universe:
  min_history_days: 180
  ma_short_window: 20
  ma_medium_window: 60
  ma_long_window: 120
  slope_lookback_days: 10
  strength_lookback_days: 60
  quality_lookback_days: 60
  min_return_strength_lookback: 0.15
  max_drawdown_quality_lookback: 0.18
  min_avg_amount_20d: 100000000
  high_lookback_days: 120

trend_signals:
  breakout:
    platform_min_window_days: 20
    platform_max_window_days: 40
    platform_range_max: 0.18
    breakout_volume_ratio_min: 1.2
    breakout_max_distance_pct: 0.05
    new_high_lookback_days: 120
    new_high_tolerance_pct: 0.02
  pullback:
    recent_high_lookback_days: 20
    max_drawdown_from_recent_high: 0.12
    proximity_to_ma20: 0.03
    proximity_to_ma60: 0.05
    volume_contraction_max: 0.95
    rebound_min_return_1d: 0.0
    lower_shadow_min: 0.2

trend_indicator_weights:
  trend_base_weight: 0.35
  price_action_weight: 0.30
  macd_weight: 0.18
  volume_weight: 0.10
  volume_price_divergence_weight: 0.10
  boll_weight: 0.10
  rsi_weight: 0.08
  kdj_weight: 0.08
  atr_weight: 0.06

trend_entry_rules:
  buy_score_min: 80.0
  trend_base_score_min: 65.0
  price_action_score_min: 60.0
  macd_score_min: 35.0
  positive_indicator_count_min: 3
  breakout:
    buy_score_min: 81.3308
    price_action_score_min: 75.0373
  pullback: {}

trend_backtest:
  holding_days: [5, 10, 20, 40]
  portfolio_top_n: [3, 5, 10]
  entry_score_weight: 0.6
  trend_score_weight: 0.4
  entry_timing: same_close

strategies:
  type1:
    min_old_high_gap_days: 60
    min_drawdown_pct: 0.10
    peak_window_days: 10
    breakout_volume_lookback_days: 20
    breakout_volume_multiplier: 3.0
    near_high_threshold_pct: 0.08
    require_break_below_ma60: true
  type2:
    min_old_high_gap_days: 60
    min_drawdown_pct: 0.10
    peak_window_days: 10
    breakout_volume_lookback_days: 20
    breakout_volume_multiplier: 3.0
    require_break_below_ma60: true
  type3:
    min_old_high_gap_days: 60
    min_drawdown_pct: 0.10
    peak_window_days: 10
    breakout_volume_lookback_days: 20
    breakout_volume_multiplier: 3.0
    post_breakout_max_days: 8
    post_breakout_max_extension_pct: 0.10
    require_break_below_ma60: true
  type4:
    trend_lookback_days: 40
    min_return_trend_lookback: 0.05
    ma60_rising_lookback: 10
    platform_window_days: 20
    platform_range_max: 0.15
    platform_upper_half_min_days: 10
    breakout_volume_ratio_min: 1.1
    breakout_lookback_days: 10
    breakout_min_distance_pct: -0.05
    breakout_max_distance_pct: 0.10
  type5:
    trend_lookback_days: 40
    min_return_trend_lookback: 0.15
    ma_rising_lookback: 10
    proximity_to_ma20: 0.03
    max_drawdown_15d: 0.12
    volume_contraction_max: 0.90
  type6:
    strong_lookback_days: 30
    min_return_strong_lookback: 0.25
    strong_day_return_min: 0.07
    consolidation_min_days: 5
    consolidation_max_days: 12
    consolidation_range_max: 0.15
    restart_breakout_days: 5
