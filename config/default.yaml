    min_peak_age_days: 20
    max_peak_age_days: 35
    peak_left_window_days: 20
    peak_right_window_days: 20
    neck_lookback_days: 30
    neck_min_return: 0.18
    neck_low_to_peak_min_return: 0.20
    require_peak_above_ma60: true
    peak_close_above_ma20_min_pct: 0.00
