provider: baostock
adjustment: qfq

network:
  http_proxy: http://127.0.0.1:7897
  https_proxy: http://127.0.0.1:7897
  socks5_proxy: socks5://127.0.0.1:7897
  no_proxy: 127.0.0.1,localhost

storage:
  base_dir: data
  universe_file: universe/main_board.parquet
  signals_dir: signals
  reports_dir: reports
  daily_dir: daily

universe:
  exclude_st: true
  min_history_days: 60
  min_avg_amount_20d: 100000000

history_momentum_filter:
  lookback_days: 200
  window_days: 5
  min_return: 0.10

screening:
  output_limit: 50

strategies:
  type1:
    min_old_high_gap_days: 60
    min_drawdown_pct: 0.10
    peak_window_days: 40
    breakout_volume_high_lookback_days: 90
    breakout_min_close_position: 0.60
    breakout_max_upper_shadow_pct: 0.35
    breakout_min_body_pct: 0.25
    near_high_threshold_pct: 0.05
    pre_breakout_volume_ratio_max: 1.5
    require_break_below_ma60: true
  type2:
    min_old_high_gap_days: 60
    min_drawdown_pct: 0.10
    peak_window_days: 40
    breakout_volume_high_lookback_days: 90
    breakout_min_close_position: 0.60
    breakout_max_upper_shadow_pct: 0.35
    breakout_min_body_pct: 0.25
    post_breakout_max_days: 10
    post_breakout_max_high_extension_pct: 0.10
    post_breakout_ma20_break_tolerance_pct: 0.02
    require_break_below_ma60: true
